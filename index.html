
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Videy Streaming</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>
:root{
  --bg:#0b0b0f;
  --accent:#e50914;
  --text:#fff;
  --vh:1vh;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui}
header{background:#000;border-bottom:1px solid #1f1f2a}
.header-inner{max-width:1200px;margin:auto;padding:14px 20px;display:flex;justify-content:space-between}
.logo{color:var(--accent);font-size:22px;font-weight:700;text-decoration:none}
.container{max-width:1200px;margin:auto;padding:16px}

.player{
  display:none;background:#000;border-radius:16px;
  overflow:hidden;margin-bottom:12px;position:relative
}
.video-box{position:relative;width:100%;aspect-ratio:16/9}
video{width:100%;height:100%;object-fit:contain;background:#000}

#tapOverlay{
  position:absolute;inset:0;display:none;
  align-items:center;justify-content:center;
  font-size:64px;background:rgba(0,0,0,.25);
  z-index:6;cursor:pointer
}

#fsBtn{
  position:absolute;top:12px;right:12px;z-index:9;
  background:#e50914;color:#fff;border:none;
  padding:6px 10px;border-radius:6px;
  font-size:13px;cursor:pointer
}

#adBanner{
  position:absolute;top:12px;left:50%;
  transform:translateX(-50%);
  width:90%;max-width:600px;height:80px;
  background:#000;border-radius:12px;
  overflow:hidden;display:none;z-index:8
}
#adBanner img{width:100%;height:100%;object-fit:cover}

.seek{width:100%}

.controls{
  display:flex;gap:12px;justify-content:center;
  padding:10px;background:#050507
}
.controls button{
  background:var(--accent);border:none;color:#fff;
  padding:8px 14px;border-radius:8px;cursor:pointer
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px
}
.card{
  background:#12121a;border-radius:14px;
  cursor:pointer;overflow:hidden
}
.thumb{padding-top:56.25%;background:#000;position:relative}
.thumb::after{
  content:"VIDEO";position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);font-weight:700
}
.info{padding:10px}
.title{
  font-size:13px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis
}

.pagination{
  display:flex;justify-content:center;
  gap:10px;margin:16px 0
}
.pagination button{
  padding:6px 12px;background:var(--accent);
  border:none;color:#fff;border-radius:6px;
  cursor:pointer
}

footer{text-align:center;padding:18px;color:#777;font-size:13px}

/* ===== BROWSER FULLSCREEN MODE ===== */
body.browser-fs{overflow:hidden}
body.browser-fs header,
body.browser-fs footer,
body.browser-fs .pagination,
body.browser-fs #videos,
body.browser-fs .video-title{
  display:none!important
}
body.browser-fs .container{padding:0;max-width:none}
body.browser-fs .player{
  display:block;position:fixed;inset:0;
  width:100vw;height:calc(var(--vh)*100);
  margin:0;border-radius:0;z-index:9999
}
body.browser-fs .video-box,
body.browser-fs video{width:100%;height:100%}
body.browser-fs .controls{
  position:absolute;bottom:0;left:0;right:0
}
body.browser-fs .seek{
  position:absolute;bottom:56px;left:0;right:0
}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">VIDEY</a>
    <span style="font-size:13px;color:#aaa">Video Streaming</span>
  </div>
</header>

<div class="container">

<div id="playerBox" class="player">
  <div class="video-box">
    <video id="video" playsinline preload="metadata"></video>
    <div id="tapOverlay">▶</div>
    <a id="adBanner" target="_blank" rel="nofollow sponsored"></a>
    <button id="fsBtn">Fullscreen</button>
  </div>

  <input id="seek" class="seek" type="range" min="0" value="0">

  <div class="controls">
    <button id="back10">⏪ 10s</button>
    <button id="playPause">▶ Play</button>
    <button id="forward10">⏩ 10s</button>
  </div>
</div>

<h1 id="videoTitle" class="video-title"></h1>
<div id="videos" class="grid"></div>

<div class="pagination">
  <button id="prevBtn">Prev</button>
  <button id="nextBtn">Next</button>
</div>

</div>

<footer>© 2026 Powered by Videy</footer>

<script>
// ===============================
// FIX VH MOBILE (FULLSCREEN)
// ===============================
function setVH(){
  document.documentElement.style.setProperty(
    '--vh', `${window.innerHeight * 0.01}px`
  );
}
setVH();
window.addEventListener('resize', setVH);
window.addEventListener('orientationchange', setVH);


// ===============================
// KONFIGURASI API & IKLAN
// ===============================
const API_JSON = "https://raw.githubusercontent.com/bamsat188/listapi/main/videos.json"; // masukan api mu disini
const AD_LINK  = "https://www.effectivegatecpm.com/kjxz7ytrt?key=8c5e92e18de57c2667a5b9fffc2c6fda"; // masukan ads mu disini
const BANNER_IMG = "https://shopee.co.id/inspirasi-shopee/wp-content/uploads/2020/08/Kampus-Shopee-Inspirasi-Shopee-Blog-Header.jpg"; // masukan gambar banner mu disini


// ===============================
// DOM ELEMENT
// ===============================
const video      = document.getElementById("video");
const tapOverlay = document.getElementById("tapOverlay");
const playPause  = document.getElementById("playPause");
const back10     = document.getElementById("back10");
const forward10  = document.getElementById("forward10");
const seek       = document.getElementById("seek");
const fsBtn      = document.getElementById("fsBtn");
const playerBox  = document.getElementById("playerBox");
const adBanner   = document.getElementById("adBanner");
const titleEl    = document.getElementById("videoTitle");
const list       = document.getElementById("videos");
const prevBtn    = document.getElementById("prevBtn");
const nextBtn    = document.getElementById("nextBtn");
const pagination = document.querySelector(".pagination");


// ===============================
// SETUP BANNER IKLAN
// ===============================
adBanner.href = AD_LINK;
adBanner.innerHTML = `<img src="${BANNER_IMG}">`;


// ===============================
// STATE
// ===============================
let VIDEOS = [];
let page = 1;
let adsTimer = null;

let adsOverlayOnce = true;
let firstPlay = true;
let lastBtnAdsTime = 0;


// ===============================
// TIMER IKLAN BERDASARKAN WAKTU
// ===============================
function startAdsTimer(){
  clearInterval(adsTimer);
  adsTimer = setInterval(()=>{
    if(video.paused || document.hidden) return;
    adBanner.style.display = "block";
  }, 40000);
}

adBanner.onclick = ()=>{
  adBanner.style.display = "none";
  window.open(AD_LINK, "_blank");
};


// ===============================
// IKLAN SAAT TOMBOL
// ===============================
function hookButtonAds(){
  const now = Date.now();
  if(now - lastBtnAdsTime < 25000) return;
  lastBtnAdsTime = now;
  window.open(AD_LINK, "_blank");
}


// ===============================
// TAP OVERLAY
// ===============================
tapOverlay.onclick = ()=>{
  if(adsOverlayOnce){
    adsOverlayOnce = false;
    window.open(AD_LINK, "_blank");
  }
  video.play();
};


// ===============================
// EVENT VIDEO
// ===============================
video.addEventListener("loadedmetadata", ()=>{
  tapOverlay.style.display = "flex";
  playPause.textContent = "▶ Play";
});

video.addEventListener("pause", ()=>{
  tapOverlay.style.display = "flex";
  playPause.textContent = "▶ Play";
});

video.addEventListener("play", ()=>{
  tapOverlay.style.display = "none";
  playPause.textContent = "⏸ Pause";
  startAdsTimer();

  if(firstPlay && adsOverlayOnce){
    firstPlay = false;
    adsOverlayOnce = false;
    window.open(AD_LINK, "_blank");
  }
});


// ===============================
// KONTROL VIDEO
// ===============================
back10.onclick = ()=>{
  hookButtonAds();
  video.currentTime = Math.max(0, video.currentTime - 10);
};

forward10.onclick = ()=>{
  hookButtonAds();
  video.currentTime = Math.min(video.duration, video.currentTime + 10);
};

video.onclick = ()=>{
  hookButtonAds();
  video.paused ? video.play() : video.pause();
};


// ===============================
// SEEK BAR
// ===============================
video.addEventListener("timeupdate", ()=>{
  seek.max = video.duration || 0;
  seek.value = video.currentTime;
});

seek.oninput = ()=>{
  video.currentTime = seek.value;
};

seek.addEventListener("change", ()=>{
  hookButtonAds();
});


// ===============================
// FULLSCREEN BROWSER
// ===============================
fsBtn.onclick = ()=>{
  hookButtonAds();
  document.body.classList.toggle("browser-fs");
  fsBtn.textContent = document.body.classList.contains("browser-fs")
    ? "Exit"
    : "Fullscreen";
};


// ===============================
// ROUTER
// ===============================
function getId(){
  const m = location.hash.match(/^#\/e\/([\w]+)/);
  return m ? m[1] : null;
}

function shuffle(a){
  return a.slice().sort(()=>Math.random() - 0.5);
}


// ===============================
// RENDER HOME
// ===============================
function renderHome(){
  list.innerHTML = "";
  shuffle(VIDEOS).slice((page-1)*12, page*12).forEach(v=>{
    const c = document.createElement("div");
    c.className = "card";
    c.innerHTML = `
      <div class="thumb"></div>
      <div class="info">
        <div class="title">${v.title}</div>
      </div>
    `;
    c.onclick = ()=>{
      window.open(AD_LINK, "_blank");
      location.href = `/#/e/${v.embed}`;
    };
    list.appendChild(c);
  });
}


// ===============================
// RENDER REKOMENDASI
// ===============================
function renderRecommend(){
  list.innerHTML = "";
  shuffle(VIDEOS).slice(0,6).forEach(v=>{
    const c = document.createElement("div");
    c.className = "card";
    c.innerHTML = `
      <div class="thumb"></div>
      <div class="info">
        <div class="title">${v.title}</div>
      </div>
    `;
    c.onclick = ()=>{
      window.open(AD_LINK, "_blank");
      location.href = `/#/e/${v.embed}`;
    };
    list.appendChild(c);
  });
}


// ===============================
// ROUTE HANDLER
// ===============================
function route(){
  const id = getId();

  if(!id){
    clearInterval(adsTimer);
    adBanner.style.display = "none";
    document.body.classList.remove("browser-fs");
    fsBtn.textContent = "Fullscreen";

    playerBox.style.display = "none";
    titleEl.style.display = "none";
    pagination.style.display = "flex";

    renderHome();
    return;
  }

  const v = VIDEOS.find(x=>x.embed===id);
  if(!v) return;

  adsOverlayOnce = true;
  firstPlay = true;
  lastBtnAdsTime = 0;
  adBanner.style.display = "none";

  playerBox.style.display = "block";
  titleEl.style.display = "block";
  pagination.style.display = "none";

  titleEl.textContent = v.title;
  video.src = `https://cdn.videy.co/${id}.mp4`;

  renderRecommend();
}


// ===============================
// PAGINATION
// ===============================
prevBtn.onclick = ()=>{
  if(page > 1){
    page--;
    renderHome();
  }
};

nextBtn.onclick = ()=>{
  if(page * 12 < VIDEOS.length){
    page++;
    renderHome();
  }
};


// ===============================
// LOAD DATA
// ===============================
fetch(API_JSON)
  .then(r=>r.json())
  .then(j=>{
    VIDEOS = Array.isArray(j) ? j : (j.videos || []);
    route();
  });

window.addEventListener("hashchange", route);
</script>

#floatAds{
position:fixed;
right:18px;
bottom:90px;
width:65px;

background:#FFC107;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 5px 18px rgba(0,0,0,.4);
cursor:pointer;
z-index:999999;

#floatAds img{

<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</div>

floatAds.onclick = ()=>{
window.open(AD_LINK,"_blank");
};
</script>
</body>
